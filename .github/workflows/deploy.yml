name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Google Analytics
        env:
          GA_ID: ${{ secrets.GA_ID }}
        run: |
          python3 - <<'EOF'
          import os
          ga_id = os.environ['GA_ID']
          snippet = f'<!-- Google Analytics -->\n  <script async src="https://www.googletagmanager.com/gtag/js?id={ga_id}"></script>\n  <script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments)}}gtag("js",new Date());gtag("config","{ga_id}");</script>\n'
          path = 'index.html'
          html = open(path).read()
          open(path, 'w').write(html.replace('</head>', snippet + '</head>', 1))
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
